<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artistry Hub Commands Bot</title>

<link rel="icon" href="https://i.imgur.com/V033Fgt.png">

<style>
body {
  margin:0;
  font-family:sans-serif;
  color:white;
  overflow-x:hidden;
}

/* THEMES */
body.gradient {
  background: linear-gradient(135deg,#ff0000,#ff0080,#8a2be2,#00bfff);
  background-size:300% 300%;
  animation: gradientMove 10s ease infinite;
}
body.dark { background:#0a0a0a; }
body.light { background:#f5f5f5; color:#111; }

@keyframes gradientMove {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* HEADER */
.header { text-align:center; padding:15px; }
.header h1 { font-size:22px; }

/* GRID */
.container {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:12px;
  padding:15px;
  padding-bottom:120px;
}

.button {
  height:70px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.2);
  color:inherit;
  font-size:14px;
  position:relative;
}

/* NAV */
.side {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
}

.side button {
  width:55px;
  height:55px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.25);
}

/* PANELS */
.panel {
  position:fixed;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  padding:20px;
  display:none;
  overflow-y:auto;
}
.panel.open { display:block; }

.panel input, .panel select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

/* STATUS */
.status {
  position:fixed;
  bottom:80px;
  right:10px;
  background:black;
  padding:10px;
  border-radius:8px;
}

/* POPUP */
.popup {
  position:fixed;
  top:15px;
  right:15px;
  background:rgba(0,0,0,0.8);
  padding:8px 12px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body class="gradient">

<div class="header">
<h1 id="title">🎨 Artistry Hub Commands Bot</h1>
</div>

<div class="container" id="buttons"></div>

<div class="side">
<button onclick="togglePanel('settings')">⚙️</button>
<button onclick="togglePanel('history')">📜</button>
<button onclick="togglePanel('errors')">⚠️</button>
<button onclick="togglePanel('help')">❓</button>
<button onclick="togglePanel('sendPanel')">✉️</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="panel">
<button onclick="togglePanel('settings')">Close</button>
<h3>Settings</h3>

<input id="siteTitle" placeholder="Site Title">
<input id="username" placeholder="Username">

<input id="urlName" placeholder="Name">
<input id="urlValue" placeholder="Webhook URL">
<button onclick="saveURL()">Save URL</button>

<select id="urlSelect" onchange="selectURL()"></select>
<div id="urlList"></div>
</div>

<!-- SEND -->
<div id="sendPanel" class="panel">
<button onclick="togglePanel('sendPanel')">Close</button>
<h3>Send Message</h3>

<select id="sendUrlSelect"></select>
<input id="panelMessage" placeholder="Type message...">
<button onclick="sendPanelMessage()">Send</button>
</div>

<!-- HISTORY -->
<div id="history" class="panel">
<button onclick="togglePanel('history')">Close</button>
<h3>History</h3>
<button onclick="clearHistory()">🗑 Clear</button>
<div id="historyList"></div>
</div>

<!-- ERRORS -->
<div id="errors" class="panel">
<button onclick="togglePanel('errors')">Close</button>
<h3>Errors</h3>
<div id="errorList"></div>
</div>

<!-- HELP -->
<div id="help" class="panel">
<button onclick="togglePanel('help')">Close</button>
<h3>📖 Help</h3>
<p>Use Settings to add webhook URLs.</p>
<p>Select a chat, then press buttons or send messages.</p>
</div>

<div id="status" class="status">⚪ Idle</div>
<div id="popup" class="popup">Sent!</div>

<script>
// ================= BUTTONS =================
const cmds=[
"run","help","deny","random","fact","quote","challenge","riddle",
"trivia","joke","schedule","word","poll"
];

const labels=[
"▶ Run","❓ Help","⛔ Deny","🎲 Random","📚 Fact","💬 Quote","🎨 Challenge",
"🧠 Riddle","❗ Trivia","😂 Joke","📅 Schedule","📖 Word","📊 Poll"
];

const container=document.getElementById('buttons');

cmds.forEach((c,i)=>{
  let b=document.createElement('button');
  b.className='button';
  b.innerText=labels[i];
  b.onclick=()=>send(c);
  container.appendChild(b);
});

// ================= URL SYSTEM =================
function saveURL(){
  let urls=JSON.parse(localStorage.getItem('urls')||'{}');
  urls[urlName.value]=urlValue.value;
  localStorage.setItem('urls',JSON.stringify(urls));
  loadURLs();
}

function loadURLs(){
  let urls=JSON.parse(localStorage.getItem('urls')||'{}');

  urlSelect.innerHTML='';
  sendUrlSelect.innerHTML='';
  urlList.innerHTML='';

  for(let name in urls){
    let opt=document.createElement('option');
    opt.value=name;
    opt.textContent=name;
    urlSelect.appendChild(opt);

    let opt2=document.createElement('option');
    opt2.value=urls[name];
    opt2.textContent=name;
    sendUrlSelect.appendChild(opt2);

    let div=document.createElement('div');
    div.innerText=name;
    div.onclick=()=>setActiveURL(name);
    urlList.appendChild(div);
  }
}

function setActiveURL(name){
  let urls=JSON.parse(localStorage.getItem('urls'));
  localStorage.setItem('url',urls[name]);
}

function selectURL(){
  setActiveURL(urlSelect.value);
}

// ================= SEND =================
function send(cmd){
  let url=localStorage.getItem('url');
  if(!url){ setStatus('🔴 No URL'); return; }

  setStatus('🟡 Sending...');
  fetch(url+"?action="+cmd)
  .then(()=>success(cmd))
  .catch(()=>success(cmd));
}

function sendPanelMessage(){
  let msg=panelMessage.value.trim();
  if(!msg) return;

  let url=sendUrlSelect.value;
  if(!url){ setStatus('🔴 No URL'); return; }

  setStatus('🟡 Sending...');
  fetch(url+"?action=message&text="+encodeURIComponent(msg))
  .then(()=>{
    success("message");
    panelMessage.value='';
  })
  .catch(()=>{
    success("message");
    panelMessage.value='';
  });
}

function success(cmd){
  setStatus('🟢 Success');
  popup.style.display='block';
  logHistory(cmd);

  setTimeout(()=>popup.style.display='none',1500);
  setTimeout(()=>setStatus('⚪ Idle'),2000);
}

// ================= HISTORY =================
function logHistory(cmd){
  let h=JSON.parse(localStorage.getItem('history')||'[]');
  h.unshift(cmd+" • "+new Date().toLocaleTimeString());
  localStorage.setItem('history',JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  historyList.innerHTML='';
  (JSON.parse(localStorage.getItem('history')||'[]')).forEach(e=>{
    let d=document.createElement('div');
    d.innerText=e;
    historyList.appendChild(d);
  });
}

function clearHistory(){
  localStorage.removeItem('history');
  renderHistory();
}

// ================= ERRORS =================
function logError(err){
  let e=JSON.parse(localStorage.getItem('errors')||'[]');
  e.unshift(err.toString());
  localStorage.setItem('errors',JSON.stringify(e));
  renderErrors();
}

function renderErrors(){
  errorList.innerHTML='';
  (JSON.parse(localStorage.getItem('errors')||'[]')).forEach(e=>{
    let d=document.createElement('div');
    d.innerText=e;
    errorList.appendChild(d);
  });
}

// ================= UI =================
function togglePanel(id){
  document.getElementById(id).classList.toggle('open');
}

function setStatus(t){
  document.getElementById('status').innerText=t;
}

// ================= INIT =================
loadURLs();
renderHistory();
renderErrors();
</script>

</body>
</html>
