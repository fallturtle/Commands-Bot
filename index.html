<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artistry Hub Commands Bot</title>

<!-- Favicon -->
<link rel="icon" href="https://i.imgur.com/V033Fgt.png" type="image/png">

<style>
body {
  margin:0;
  font-family:sans-serif;
  color:white;
  overflow-x:hidden;
  overflow-y:auto;
}

/* THEMES */
body.gradient {
  background: linear-gradient(135deg,#ff0000,#ff0080,#8a2be2,#00bfff);
  background-size:300% 300%;
  animation: gradientMove 10s ease infinite;
}
body.dark { background:#0a0a0a; }
body.light { background:#f5f5f5; color:#111; }

@keyframes gradientMove {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* HEADER */
.header { text-align:center; padding:15px; }
.header h1 { font-size:22px; }

/* GRID */
.container {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:12px;
  padding:15px;
  padding-bottom:120px;
}

.button {
  height:70px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.2);
  color:inherit;
  font-size:14px;
  backdrop-filter:blur(10px);
  position:relative;
}

.cooldown-bar {
  position:absolute;
  top:0; left:0;
  height:100%;
  width:0%;
  background:rgba(255,255,255,0.2);
}

/* NAV */
.side {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
}
.side button {
  width:55px;height:55px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.25);
}

/* PANELS */
.panel {
  position:fixed;
  left:0; top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  padding:20px;
  display:none;
  overflow-y:auto;
}
.panel.open { display:block; }

/* TEXT */
.panel *:not(input):not(select){ color:white; }
.panel input, .panel select { color:#111; background:white; }

/* STATUS */
.status {
  position:fixed;
  bottom:80px;
  right:10px;
  background:black;
  padding:10px;
  border-radius:8px;
}

/* POPUP */
.popup {
  position:fixed;
  top:15px; right:15px;
  background:rgba(0,0,0,0.8);
  padding:8px 12px;
  border-radius:8px;
  display:none;
}

.footer {
  text-align:center;
  font-size:12px;
  padding-bottom:100px;
}

.url-item {
  background:rgba(255,255,255,0.1);
  padding:8px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
}
.url-item.active { outline:2px solid #00ffcc; }

canvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="shader"></canvas>

<div class="header">
<h1 id="title">🎨 Artistry Hub Commands Bot</h1>
</div>

<div class="container" id="buttons"></div>

<div class="side">
<button onclick="togglePanel('settings')">⚙️</button>
<button onclick="togglePanel('history')">📜</button>
<button onclick="togglePanel('errors')">⚠️</button>
<button onclick="togglePanel('help')">❓</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="panel">
<button onclick="togglePanel('settings')">Close</button>
<h3>Settings</h3>

<input id="siteTitle" placeholder="Site Title"><br><br>
<input id="username" placeholder="Username"><br><br>

<input id="urlName" placeholder="Name"><br><br>
<input id="urlValue" placeholder="URL"><br><br>
<button onclick="saveURL()">Save URL</button><br><br>

<select id="urlSelect" onchange="selectURL()"></select><br><br>
<div id="urlList"></div>

<br>
<button onclick="exportURLs()">📤 Export</button>
<input type="file" onchange="importURLs(event)">

<br><br>
<select id="bgSelect" onchange="changeBG(this.value)">
<option value="gradient">Gradient</option>
<option value="dark">Dark</option>
<option value="light">Light</option>
<option value="hue">Hue</option>
<option value="equinox">Equinox</option>
<option value="interference">Interference</option>
<option value="boxes">Boxes</option>
</select>

<br><br>
<button onclick="saveSettings()">Save</button>
</div>

<!-- HISTORY -->
<div id="history" class="panel">
<button onclick="togglePanel('history')">Close</button>
<h3>History</h3>
<button onclick="clearHistory()">🗑 Clear</button>
<div id="historyList"></div>
</div>

<!-- ERRORS -->
<div id="errors" class="panel">
<button onclick="togglePanel('errors')">Close</button>
<h3>Errors</h3>
<div id="errorList"></div>
</div>

<!-- HELP -->
<div id="help" class="panel">
<button onclick="togglePanel('help')">Close</button>
<h3>📖 Help</h3>
<p>Use Settings to add URLs, then run commands.</p>
</div>

<div id="status" class="status">⚪ Idle</div>
<div id="popup" class="popup">Sent!</div>

<div class="footer">Artistry Hub © 2026</div>

<script>
const cmds=["seturl","run","help","deny","random","fact","quote","challenge","riddle","trivia","joke","schedule","word","poll","errors"];
const labels=["🔧","▶","❓","⛔","🎲","📚","💬","🎨","🧠","❗","😂","📅","📖","📊","⚠️"];

const container=document.getElementById('buttons');

cmds.forEach((c,i)=>{
let b=document.createElement('button');
b.className='button';
b.innerText=labels[i];

let bar=document.createElement('div');
bar.className='cooldown-bar';
b.appendChild(bar);

b.onclick=()=>clickCmd(c,b,bar);
container.appendChild(b);
});

/* SETTINGS */
function saveSettings(){
localStorage.setItem('title',siteTitle.value);
localStorage.setItem('username',username.value);
localStorage.setItem('bg',bgSelect.value);
applyBG(bgSelect.value);
title.innerText=siteTitle.value;
}

/* BG */
function changeBG(bg){
localStorage.setItem('bg',bg);
applyBG(bg);
}

const canvas=document.getElementById('shader');
const ctx=canvas.getContext('2d');
let anim;

function applyBG(bg){
cancelAnimationFrame(anim);

document.body.style.color="white";
document.body.classList.remove("gradient","dark","light","hue","equinox","interference","boxes");

if(bg==="gradient"){document.body.classList.add("gradient");return;}
if(bg==="dark"){document.body.classList.add("dark");return;}
if(bg==="light"){document.body.classList.add("light");document.body.style.color="#111";return;}

if(bg==="equinox"||bg==="boxes"||bg==="interference"){
document.body.style.color="#111";
}

runShader(bg);
}

function runShader(type){
let t=0;
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(type==="interference"){
for(let x=0;x<canvas.width;x+=6){
for(let y=0;y<canvas.height;y+=6){
let v=Math.sin(x*0.02+t)+Math.cos(y*0.02+t);
let hue=(v*120+200)%360;
ctx.fillStyle=`hsl(${hue},100%,60%)`;
ctx.fillRect(x,y,5,5);
}}}

t+=0.01;
anim=requestAnimationFrame(draw);
}
draw();
}

/* INIT */
(function(){
let savedTitle=localStorage.getItem('title')||"🎨 Artistry Hub Commands Bot";
title.innerText=savedTitle;
siteTitle.value=savedTitle;

username.value=localStorage.getItem('username')||"";

let bg=localStorage.getItem('bg')||"gradient";
bgSelect.value=bg;
applyBG(bg);
})();
</script>

</body>
</html>
